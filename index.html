<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/logo/ascend-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ascend Aviation Refinement - Premium aircraft detailing, maintenance, and refinement services. Elevate your aircraft to new heights." />
    <title>Ascend Aviation Refinement | Premium Aircraft Services</title>
  </head>
  <body class="bg-night">
    <!-- Hidden form for Netlify Forms detection (required for React SPAs) -->
    <form name="quote-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="aircraft-type" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
