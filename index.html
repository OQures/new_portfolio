<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ascend Aviation Refinement: aircraft detailing in the DMV, plus Pennsylvania and D.C. Interior and exterior detailing, polish, ceramic coating, and brightwork."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Ascend Aviation Refinement</title>
  </head>
  <body>
    <!-- Netlify discovers forms from built HTML; mirrors QuoteModal (name="quote-request"). -->
    <form name="quote-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="aircraft" />
      <input type="text" name="service" />
      <input type="text" name="service_region" />
      <textarea name="message"></textarea>
      <input type="checkbox" name="consent" />
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
